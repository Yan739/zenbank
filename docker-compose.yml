version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: zenbank-db
    environment:
      POSTGRES_DB: zenbank_db
      POSTGRES_USER: yann
      POSTGRES_PASSWORD: bankpassword
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: